name: The Hive - Massive Extraction
on:
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Install Dependencies
        run: |
          npm install
          npx playwright install --with-deps chromium
          
      - name: Run Extraction Swarm
        run: node parallel_swarm.js
        
      - name: Upload Manifest & Assets
        uses: actions/upload-artifact@v4
        with:
          name: full-store-extraction
          path: output/
