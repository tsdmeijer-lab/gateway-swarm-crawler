name: The Hive - Massive Extraction
on:
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.set-chunks.outputs.chunks }}
    steps:
      - uses: actions/checkout@v4
      - name: Calculate chunks
        id: set-chunks
        run: |
          LENGTH=$(jq '. | length' output/store_manifest.json)
          CHUNKS=$(( (LENGTH + 9) / 10 ))
          ARRAY=$(node -e "console.log(JSON.stringify(Array.from({length: $CHUNKS}, (_, i) => i)))")
          echo "chunks=$ARRAY" >> $GITHUB_OUTPUT

  scrape:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: ${{ fromJson(needs.setup.outputs.chunks) }}
      fail-fast: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Install Dependencies
        run: |
          npm install
          npx playwright install --with-deps chromium
          
      - name: Run Extraction Swarm (Chunk ${{ matrix.chunk }})
        env:
          CHUNK_INDEX: ${{ matrix.chunk }}
        run: node parallel_swarm.js
        
      - name: Upload Manifest & Assets
        uses: actions/upload-artifact@v4
        with:
          name: full-store-extraction-chunk-${{ matrix.chunk }}
          path: output/images/products/

  aggregate:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - name: Download all chunk artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-products
          pattern: full-store-extraction-chunk-*
          merge-multiple: true

      - name: Upload Master Zip
        uses: actions/upload-artifact@v4
        with:
          name: FULL-STORE-MOCKUPS-MASTER
          path: all-products/
