name: The Hive - Massive Extraction
on:
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape_and_download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: |
          npm install
          npx playwright install --with-deps chromium
          
      - name: Run Phase 4 (Metadata Extraction)
        env:
          R2_PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
        run: node 4_extract_metadata.js
        
      - name: Run Verification Bridge
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: node verify_parity.js
        
      - name: Run Phase 5 (Mockup Download)
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: node 5_download_mockups.js
        
      - name: Upload Manifest Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: full-store-manifest
          path: |
            output/parallel_swarm_manifest.json
            output/301_image_redirect_map.json
